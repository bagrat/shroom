<!doctype html>
<!--
  shroom per-video player. ONE template → N static pages (SPEC §6).
  Rendered at finalize by scripts/page/lib/render.mjs. Every double-brace token is
  substituted with a per-video value (escaped); crawlers see the baked og: tags
  without running JS, so Slack/Twitter/iMessage unfurl correctly.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- Safari ignores SVG favicons; PNG fallback (also the apple-touch-icon). -->
  <link rel="icon" type="image/png" sizes="180x180" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <title>{{TITLE}}</title>

  <!-- Open Graph / Twitter unfurl cards (baked, JS-free) -->
  <meta property="og:type" content="video.other" />
  <meta property="og:title" content="{{TITLE}}" />
  <meta property="og:description" content="{{DESCRIPTION}}" />
  <meta property="og:url" content="{{PAGE_URL}}" />
  <meta property="og:image" content="{{POSTER_URL}}" />
  <meta property="og:video:duration" content="{{DURATION_SEC}}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{TITLE}}" />
  <meta name="twitter:description" content="{{DESCRIPTION}}" />
  <meta name="twitter:image" content="{{POSTER_URL}}" />

  <style>
    :root { color-scheme: dark; --fg: #ECEFF4; --muted: #D8DEE9; --bg: #2E3440; --accent: #88C0D0; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px 20px 48px; }
    header { display: flex; align-items: baseline; gap: 12px; margin: 0 0 16px; }
    h1 { font-size: 20px; font-weight: 600; margin: 0; }
    .dur { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .download { margin-left: auto; white-space: nowrap; color: var(--accent);
      text-decoration: none; border: 1px solid rgba(136,192,208,.4); border-radius: 8px;
      padding: 4px 10px; font-size: 13px; }
    .download:hover { background: rgba(136,192,208,.12); }
    .frame { position: relative; background: #000; border-radius: 12px; overflow: hidden;
      aspect-ratio: 16 / 9; box-shadow: 0 8px 40px rgba(0,0,0,.5); }
    video { width: 100%; height: 100%; display: block; background: #000; }

    /* Chapter timeline: proportional, seekable chunks under the video; each fills
       with the accent colour as the playhead crosses it. Empty (no chapters) →
       collapses. */
    .timeline { display: flex; gap: 2px; margin: 8px 0 0; height: 8px; }
    .timeline:empty { display: none; }
    .timeline .seg { position: relative; flex-basis: 0; min-width: 4px; height: 100%;
      background: rgba(216,222,233,.18); border: 0; border-radius: 3px; padding: 0;
      cursor: pointer; overflow: hidden; }
    .timeline .seg:hover { background: rgba(216,222,233,.32); }
    .timeline .seg.active { background: rgba(136,192,208,.35); }
    .timeline .seg .fill { position: absolute; inset: 0 auto 0 0; width: 0; background: var(--accent); }

    .share { display: flex; gap: 8px; align-items: center; margin: 14px 0 0; }
    .share[hidden] { display: none; }
    .share button { background: transparent; border: 1px solid rgba(216,222,233,.25);
      color: var(--muted); border-radius: 8px; padding: 5px 12px; font: inherit;
      font-size: 13px; cursor: pointer; }
    .share button:hover { background: rgba(216,222,233,.08); color: var(--fg); }
    .share .copied { color: var(--accent); font-size: 13px; }
    .share .copied[hidden] { display: none; }

    .tldr { color: var(--muted); margin: 16px 0 0; max-width: 70ch; }
    .chapters { margin: 20px 0 0; padding: 0; list-style: none;
      display: grid; gap: 2px; }
    .chapters li { margin: 0; }
    .chapters button { width: 100%; text-align: left; cursor: pointer;
      background: transparent; border: 0; color: var(--fg); padding: 8px 10px;
      border-radius: 8px; font: inherit; display: flex; gap: 12px; align-items: baseline; }
    .chapters button:hover { background: rgba(216,222,233,.08); }
    .chapters .t { color: var(--accent); font-variant-numeric: tabular-nums; min-width: 52px; }
    footer { margin: 36px 0 0; color: var(--muted); font-size: 13px; }
    footer a { color: var(--muted); }

    /* Embed mode (?embed=1): strip the chrome to just the player + its timeline,
       for the Loom-style copy-embed iframe. */
    body.embed .wrap { max-width: none; padding: 0; }
    body.embed header, body.embed footer, body.embed .tldr,
    body.embed .chapters, body.embed .share { display: none !important; }
    body.embed .frame { border-radius: 0; box-shadow: none; }
    body.embed .timeline { margin: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>{{TITLE}}</h1>
      <span class="dur">{{DURATION_LABEL}}</span>
      {{DOWNLOAD_HTML}}
    </header>

    <div class="frame">
      <video id="shroom-video" controls playsinline poster="{{POSTER_URL}}"></video>
    </div>

    <!-- Seekable chapter timeline (built by JS from the data island; collapses if empty). -->
    <div class="timeline" id="shroom-timeline"></div>

    <!-- Share toolbar (revealed by JS only when there's a public page URL). -->
    <div class="share" id="shroom-share" hidden>
      <button type="button" data-copy="link">Copy link</button>
      <button type="button" data-copy="embed">Copy embed</button>
      <span class="copied" id="shroom-copied" hidden>Copied</span>
    </div>

    {{TLDR_HTML}}
    {{CHAPTERS_HTML}}

    <footer>Recorded with <a href="https://github.com/bagrat/shroom">shroom</a> · your bytes, your bucket.</footer>
  </div>

  <!-- Per-video runtime data island (the only JS-readable state). -->
  <script id="shroom-data" type="application/json">{{DATA_JSON}}</script>
  <script>
    (function () {
      var data = JSON.parse(document.getElementById('shroom-data').textContent);
      var video = document.getElementById('shroom-video');
      var dur = Number(data.durationSec) || 0;
      var chapters = Array.isArray(data.chapters) ? data.chapters : [];

      // Embed mode: ?embed strips the page chrome to just the player.
      try {
        if (new URLSearchParams(location.search).has('embed')) document.body.classList.add('embed');
      } catch (e) { /* no URLSearchParams (ancient browser) — show full page */ }

      function seekTo(t) { video.currentTime = t || 0; var p = video.play(); if (p && p.catch) p.catch(function () {}); }

      // Chapter LIST buttons (the textual index).
      document.querySelectorAll('[data-seek]').forEach(function (el) {
        el.addEventListener('click', function () { seekTo(parseFloat(el.getAttribute('data-seek')) || 0); });
      });

      // Chapter TIMELINE: one proportional chunk per chapter, click to seek.
      var timeline = document.getElementById('shroom-timeline');
      var segs = [];
      if (timeline && chapters.length && dur > 0) {
        chapters.forEach(function (c, i) {
          var start = Math.min(Math.max(0, c.t || 0), dur);
          var end = i + 1 < chapters.length ? Math.min(chapters[i + 1].t, dur) : dur;
          var seg = document.createElement('button');
          seg.type = 'button';
          seg.className = 'seg';
          seg.style.flexGrow = Math.max(0.001, (end - start) / dur); // proportional width
          seg.title = c.label;
          seg.setAttribute('aria-label', c.label);
          var fill = document.createElement('span');
          fill.className = 'fill';
          seg.appendChild(fill);
          seg.addEventListener('click', function () { seekTo(start); });
          timeline.appendChild(seg);
          segs.push({ fill: fill, el: seg, start: start, end: end });
        });
      }

      // Advance the timeline fill + active highlight with playback.
      video.addEventListener('timeupdate', function () {
        var t = video.currentTime || 0;
        for (var i = 0; i < segs.length; i++) {
          var s = segs[i], span = s.end - s.start || 1;
          var pct = t <= s.start ? 0 : t >= s.end ? 100 : ((t - s.start) / span) * 100;
          s.fill.style.width = pct + '%';
          if (t >= s.start && t < s.end) s.el.classList.add('active');
          else s.el.classList.remove('active');
        }
      });

      // Share: Copy link / Copy embed (Loom-style responsive iframe). Shown only
      // when a public page URL exists (a local-only render has none to share).
      var share = document.getElementById('shroom-share');
      var toast = document.getElementById('shroom-copied');
      if (share && data.pageUrl) {
        share.hidden = false;
        var toastTimer;
        function copied() {
          if (!toast) return;
          toast.hidden = false;
          clearTimeout(toastTimer);
          toastTimer = setTimeout(function () { toast.hidden = true; }, 1500);
        }
        function copy(text) {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(copied, copied);
          } else {
            var ta = document.createElement('textarea');
            ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); } catch (e) {}
            document.body.removeChild(ta); copied();
          }
        }
        share.querySelectorAll('[data-copy]').forEach(function (b) {
          b.addEventListener('click', function () {
            var url = data.pageUrl;
            if (b.getAttribute('data-copy') === 'embed') {
              var src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'embed=1';
              copy('<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;">'
                + '<iframe src="' + src + '" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;"'
                + ' allow="fullscreen" allowfullscreen></iframe></div>');
            } else {
              copy(url);
            }
          });
        });
      }

      // Keyboard: ← / → seek 5s, space play/pause, f fullscreen.
      document.addEventListener('keydown', function (e) {
        if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
        var max = dur || video.duration || 1e9;
        if (e.key === 'ArrowRight') video.currentTime = Math.min(max, (video.currentTime || 0) + 5);
        else if (e.key === 'ArrowLeft') video.currentTime = Math.max(0, (video.currentTime || 0) - 5);
        else if (e.key === ' ') { e.preventDefault(); if (video.paused) video.play(); else video.pause(); }
        else if (e.key === 'f' || e.key === 'F') { if (video.requestFullscreen) { var r = video.requestFullscreen(); if (r && r.catch) r.catch(function () {}); } }
      });

      // Safari (and iOS) play HLS natively; everyone else gets hls.js, loaded
      // lazily so native browsers never pay the ~100KB.
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = data.hlsUrl;
      } else {
        var s = document.createElement('script');
        s.src = data.hlsJsUrl;
        s.onload = function () {
          if (window.Hls && window.Hls.isSupported()) {
            var hls = new window.Hls({ enableWorker: true });
            hls.loadSource(data.hlsUrl);
            hls.attachMedia(video);
          } else {
            video.src = data.hlsUrl; // last-ditch: let the browser try
          }
        };
        s.onerror = function () { video.src = data.hlsUrl; };
        document.head.appendChild(s);
      }
    })();
  </script>
</body>
</html>
